name: fitnova
description: FitNova smart fitness and life assistant built with Flutter and Supabase.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_local_notifications: ^19.4.0
  shared_preferences: ^2.3.3
  supabase_flutter: ^2.8.0
  intl: ^0.20.2
  http: ^1.6.0
  timezone: ^0.10.1
  health: ^13.3.1
  permission_handler: ^12.0.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^7.1.1
  uuid: ^4.5.3
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans/PlusJakartaSans-Variable.ttf
